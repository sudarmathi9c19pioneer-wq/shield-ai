<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - AI Fake Job Detector</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>📝 Create Account</h1>

    <h3>AI Fake Job Detector</h3>

    {% if message %}
        <p class="error">{{ message }}</p>
    {% endif %}

    <form method="POST">

        <label>Username</label>

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>


        <label>Password</label>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>


        <button type="submit">
            Create Account
        </button>

    </form>

    <br>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>

</html>
